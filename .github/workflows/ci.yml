name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: npm ci
      - run: npm run ci
